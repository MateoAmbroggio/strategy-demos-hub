<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strategy · Demos Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     1) BRANDING — EDITÁ ESTO PARA MATCHEAR 1:1
     Pegá acá los hex exactos de Strategy y el logo más abajo.
     ============================================================ */
  :root{
    --brand:        #1FAE7A;   /* acento (el puntito "Repositorio de Ventas" era verde) */
    --brand-ink:    #0E1116;   /* texto principal / casi negro */
    --bg:           #FAFAF8;   /* fondo */
    --surface:      #FFFFFF;   /* cards / header */
    --muted:        #6B7280;   /* texto secundario */
    --line:         #E8E8E3;   /* bordes */
    --radius:       14px;
    --maxw:         1160px;
    --font:         'Manrope', system-ui, sans-serif;
  }

  /* reset */
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--brand-ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ---------- HEADER ---------- */
  header.site{
    position:sticky;top:0;z-index:40;
    background:rgba(255,255,255,.85);
    backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  .bar{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
  .brand{display:flex;align-items:center;gap:14px}

  /* LOGO: reemplazá el SVG de abajo por tu <img src="logo.svg" .../> */
  .brand .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand .logo .mark{width:26px;height:26px;border-radius:7px;background:var(--brand-ink);
    display:grid;place-items:center;color:#fff;font-size:15px;font-weight:800}
  .brand .divider{width:1px;height:22px;background:var(--line)}
  .brand .sub{font-weight:600;font-size:14px;color:var(--muted);letter-spacing:.01em}

  .pill{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;
    color:var(--brand-ink);background:var(--surface);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--brand);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 22%,transparent)}

  /* ---------- HERO ---------- */
  .hero{padding:64px 0 36px}
  .hero h1{font-size:clamp(34px,5vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1.05}
  .hero h1 em{font-style:normal;color:var(--brand)}
  .hero p{margin-top:16px;max-width:620px;font-size:17px;color:var(--muted)}

  /* ---------- CONTROLS ---------- */
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:14px;
    margin:30px 0 8px;padding-bottom:22px;border-bottom:1px solid var(--line)}
  .search{flex:1;min-width:240px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 42px;font:inherit;font-size:15px;
    background:var(--surface);border:1px solid var(--line);border-radius:11px;outline:none;
    transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--brand);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 16%,transparent)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font:inherit;font-size:13px;font-weight:600;cursor:pointer;
    padding:8px 14px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);transition:all .15s}
  .chip:hover{border-color:var(--brand-ink);color:var(--brand-ink)}
  .chip.active{background:var(--brand-ink);border-color:var(--brand-ink);color:#fff}

  .count{font-size:13px;color:var(--muted);margin:18px 0 22px}
  .count b{color:var(--brand-ink)}

  /* ---------- GRID ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;
    padding-bottom:70px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}
  .card:hover{transform:translateY(-4px);border-color:transparent;
    box-shadow:0 18px 40px -16px rgba(14,17,22,.22)}
  .thumb{aspect-ratio:16/10;position:relative;overflow:hidden;
    display:grid;place-items:center;color:#fff;background:var(--brand-ink)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .ph{font-size:30px;font-weight:800;letter-spacing:-.03em;opacity:.92;padding:0 18px;text-align:center}
  .thumb::after{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 120% at 80% 0%,color-mix(in srgb,var(--brand) 55%,transparent),transparent 60%)}
  .card:hover .play{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.85);
    z-index:2;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.95);
    display:grid;place-items:center;opacity:0;transition:.2s}
  .play svg{width:20px;height:20px;margin-left:3px;fill:var(--brand-ink)}
  .body{padding:18px 18px 20px}
  .body h3{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .body p{margin-top:7px;font-size:14px;color:var(--muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tags{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11.5px;font-weight:600;color:var(--brand-ink);
    background:color-mix(in srgb,var(--brand) 12%,var(--surface));
    border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);
    padding:4px 9px;border-radius:6px}

  .empty{text-align:center;padding:80px 0;color:var(--muted);grid-column:1/-1}

  /* ---------- MODAL ---------- */
  .modal{position:fixed;inset:0;z-index:90;display:none;
    background:rgba(10,12,16,.72);backdrop-filter:blur(4px);
    padding:24px;align-items:center;justify-content:center}
  .modal.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .dialog{width:100%;max-width:1080px;height:min(86vh,720px);background:#0c0e12;
    border-radius:16px;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  .dialog .top{display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:13px 16px;background:#11141a;border-bottom:1px solid #1d212a}
  .dialog .top h4{color:#fff;font-size:15px;font-weight:700}
  .dialog .top .acts{display:flex;align-items:center;gap:8px}
  .iconbtn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#cbd2dc;
    background:#1b1f27;border:1px solid #2a2f3a;border-radius:9px;padding:8px 12px;
    display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .iconbtn:hover{background:#242a34;color:#fff}
  .iconbtn svg{width:15px;height:15px;stroke:currentColor}
  .frameWrap{flex:1;background:#0c0e12}
  .frameWrap iframe{width:100%;height:100%;border:0}

  /* ---------- FOOTER ---------- */
  footer.site{border-top:1px solid var(--line);padding:26px 0;margin-top:auto}
  footer.site .wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    justify-content:space-between;font-size:13px;color:var(--muted)}
  footer.site .stamp{font-weight:600;letter-spacing:.02em}

  @media(max-width:560px){
    .brand .sub{display:none}
    .hero{padding:44px 0 28px}
  }
</style>
</head>
<body>

<header class="site">
  <div class="wrap bar">
    <div class="brand">
      <!-- ===== LOGO: reemplazá este bloque por <img src="logo.svg" alt="Strategy" style="height:26px"> ===== -->
      <a class="logo" href="/">
        <span class="mark">S</span>
        Strategy
      </a>
      <span class="divider"></span>
      <span class="sub">Demos Hub</span>
    </div>
    <span class="pill"><span class="dot"></span> Repositorio de Demos</span>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="hero">
      <h1>Demos de <em>producto</em>,<br>en un solo lugar.</h1>
      <p>Explorá las demos interactivas de Strategy. Hacé click en cualquiera para abrirla sin salir de la página.</p>
    </section>

    <div class="controls">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Buscar demos…" autocomplete="off" />
      </label>
      <div class="chips" id="chips"></div>
    </div>

    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<footer class="site">
  <div class="wrap">
    <span class="stamp">Strategy Demos Hub</span>
    <span>Uso interno · No distribuir externamente</span>
  </div>
</footer>

<!-- MODAL -->
<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="dialog">
    <div class="top">
      <h4 id="modalTitle"></h4>
      <div class="acts">
        <a class="iconbtn" id="openNew" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
          Nueva pestaña
        </a>
        <button class="iconbtn" id="closeModal">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          Cerrar
        </button>
      </div>
    </div>
    <div class="frameWrap"><iframe id="frame" allow="fullscreen; clipboard-write" allowfullscreen></iframe></div>
  </div>
</div>

<script>
  /* ============================================================
     2) DEMOS — AGREGÁ / EDITÁ ACÁ
     url: pegá el link de tu demo de Storylane (app.storylane.io/demo/XXXX)
     thumb: opcional, URL de imagen. Si no ponés, se genera un placeholder.
     ============================================================ */
  const DEMOS = [
    {
      id: "auto-bi",
      title: "Auto Dashboard & Reporting",
      desc: "Recorrido por la creación de dashboards y reporting self-service.",
      tags: ["Analytics", "Dashboards"],
      url: "https://app.storylane.io/demo/REEMPLAZAR-1",
      thumb: ""
    },
    {
      id: "ai-bot",
      title: "AI / Auto Bot",
      desc: "Cómo funciona el asistente de IA sobre tus datos en lenguaje natural.",
      tags: ["AI", "Productividad"],
      url: "https://app.storylane.io/demo/REEMPLAZAR-2",
      thumb: ""
    },
    {
      id: "embedded",
      title: "Embedded Analytics",
      desc: "Analytics embebido dentro de aplicaciones de terceros.",
      tags: ["Embedded", "Developers"],
      url: "https://app.storylane.io/demo/REEMPLAZAR-3",
      thumb: ""
    },
    {
      id: "data-prep",
      title: "Data Prep & Modeling",
      desc: "Preparación y modelado de datos para usuarios de negocio.",
      tags: ["Data", "Analytics"],
      url: "https://app.storylane.io/demo/REEMPLAZAR-4",
      thumb: ""
    }
  ];

  /* ============================================================
     3) LÓGICA — no hace falta tocar
     ============================================================ */
  const grid   = document.getElementById('grid');
  const chips  = document.getElementById('chips');
  const search = document.getElementById('search');
  const count  = document.getElementById('count');
  const modal  = document.getElementById('modal');
  const frame  = document.getElementById('frame');
  const mTitle = document.getElementById('modalTitle');
  const openNew= document.getElementById('openNew');

  let activeTag = 'Todas';
  let query = '';

  const allTags = ['Todas', ...new Set(DEMOS.flatMap(d => d.tags))];

  function renderChips(){
    chips.innerHTML = allTags.map(t =>
      `<button class="chip ${t===activeTag?'active':''}" data-tag="${t}">${t}</button>`
    ).join('');
    chips.querySelectorAll('.chip').forEach(c =>
      c.onclick = () => { activeTag = c.dataset.tag; renderChips(); renderGrid(); }
    );
  }

  function thumbHTML(d){
    if(d.thumb) return `<img src="${d.thumb}" alt="${d.title}" loading="lazy">`;
    return `<span class="ph">${d.title}</span>`;
  }

  function renderGrid(){
    const list = DEMOS.filter(d => {
      const okTag = activeTag === 'Todas' || d.tags.includes(activeTag);
      const okQ = !query ||
        (d.title + ' ' + d.desc + ' ' + d.tags.join(' ')).toLowerCase().includes(query);
      return okTag && okQ;
    });

    count.innerHTML = `<b>${list.length}</b> demo${list.length===1?'':'s'} disponible${list.length===1?'':'s'}`;

    if(!list.length){ grid.innerHTML = `<div class="empty">No hay demos que coincidan con tu búsqueda.</div>`; return; }

    grid.innerHTML = list.map(d => `
      <article class="card" data-id="${d.id}">
        <div class="thumb">
          ${thumbHTML(d)}
          <span class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
        </div>
        <div class="body">
          <h3>${d.title}</h3>
          <p>${d.desc}</p>
          <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </article>
    `).join('');

    grid.querySelectorAll('.card').forEach(c =>
      c.onclick = () => openDemo(c.dataset.id)
    );
  }

  function openDemo(id){
    const d = DEMOS.find(x => x.id === id);
    if(!d) return;
    mTitle.textContent = d.title;
    frame.src = d.url;
    openNew.href = d.url;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    history.replaceState(null,'', '#' + id);  // share link
  }

  function closeDemo(){
    modal.classList.remove('open');
    frame.src = 'about:blank';
    document.body.style.overflow = '';
    history.replaceState(null,'', location.pathname);
  }

  document.getElementById('closeModal').onclick = closeDemo;
  modal.onclick = e => { if(e.target === modal) closeDemo(); };
  document.addEventListener('keydown', e => { if(e.key==='Escape' && modal.classList.contains('open')) closeDemo(); });

  search.oninput = e => { query = e.target.value.trim().toLowerCase(); renderGrid(); };

  // init
  renderChips();
  renderGrid();

  // deep-link: abrir demo directo si la URL trae #id
  const hashId = location.hash.replace('#','');
  if(hashId && DEMOS.some(d => d.id === hashId)) openDemo(hashId);
</script>
</body>
</html>
